baseURL: https://www.plydb.com
languageCode: en-us
title: PlyDB
theme: hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true

menu:
  main:
    - identifier: docs
      name: Documentation
      pageRef: /docs/
      weight: 1
    - identifier: blog
      name: Blog
      pageRef: /blog/
      weight: 2
    - name: GitHub
      weight: 3
      url: "https://github.com/kineticloom/plydb"
      params:
        icon: github

params:
  description: The Universal Database Gateway for AI Agents

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/icon.svg
      # dark: images/logo-dark.svg
      # width: 40
      # height: 20
      # link: /
    width: wide
  
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
    width: normal
  
  search:
    enable: false
