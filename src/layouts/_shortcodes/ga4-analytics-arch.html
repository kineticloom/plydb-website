<div id="gaa-arch" aria-label="GA4 Analytics Starter — architecture diagram">
<style>
#gaa-arch {
  font-family: var(--ply-font-body, 'Source Sans 3', sans-serif);
  background: var(--ply-surface, #fff);
  border: 1px solid var(--ply-border, #ddd9d0);
  border-radius: 10px;
  padding: 28px 20px 20px;
  margin: 2rem auto;
  color: var(--ply-text, #1a1a1a);
  box-sizing: border-box;
  width: 100%;
  max-width: 680px;
}
#gaa-arch *, #gaa-arch *::before, #gaa-arch *::after { box-sizing: border-box; }

/* ── outer wrapper gives bottom room for labels ───────── */
.gaa-outer {
  position: relative;
  padding-bottom: 36px; /* room for labels below the flow row */
}

/* ── single flex row: boxes + connectors only ─────────── */
.gaa-flow {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  flex-wrap: nowrap;
  gap: 0;
}

/* ── node: just the box, label is absolute ────────────── */
.gaa-node {
  position: relative;
  flex-shrink: 0;
}

.gaa-node__box {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px 14px;
  border-radius: 9px;
  font-family: var(--ply-font-mono, 'IBM Plex Mono', monospace);
  font-size: 0.82rem;
  font-weight: 600;
  white-space: nowrap;
  border: 1.5px solid transparent;
  line-height: 1.2;
}

/* label floats below the box, centred on it */
.gaa-node__label {
  position: absolute;
  top: calc(100% + 7px);
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--ply-font-mono, 'IBM Plex Mono', monospace);
  font-size: 0.65rem;
  color: var(--ply-text-dim, #6b6560);
  text-align: center;
  white-space: normal;
  max-width: 9rem;
  line-height: 1.3;
  pointer-events: none;
}

/* node colour variants */
.gaa-node__box--ga4     { background: #fff7ed; border-color: #fdba74; color: #9a3412; }
.gaa-node__box--parquet { background: #f8fafc; border-color: #94a3b8; color: #334155; }
.gaa-node__box--plydb   {
  background: color-mix(in srgb, var(--ply-accent, #2563eb) 10%, transparent);
  border-color: color-mix(in srgb, var(--ply-accent, #2563eb) 40%, transparent);
  color: var(--ply-accent, #2563eb);
}
.gaa-node__box--agent   { background: #f0fdf4; border-color: #6ee7b7; color: #064e3b; }

@media (prefers-color-scheme: dark) {
  .gaa-node__box--ga4     { background: #431407; border-color: #ea580c; color: #fed7aa; }
  .gaa-node__box--parquet { background: #0f172a; border-color: #475569; color: #cbd5e1; }
  .gaa-node__box--agent   { background: #022c22; border-color: #059669; color: #6ee7b7; }
}

/* ── connector: label above SVG, both centred ─────────── */
.gaa-connector {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  gap: 2px;
  /* no margin-bottom hack — label is inline in the same flex column */
}

.gaa-connector__label {
  font-family: var(--ply-font-mono, 'IBM Plex Mono', monospace);
  font-size: 0.60rem;
  color: var(--ply-text-dim, #6b6560);
  white-space: nowrap;
  line-height: 1;
}

/* ── dash animation ───────────────────────────────────── */
@keyframes gaaDashFlow { to { stroke-dashoffset: -20; } }
.gaa-dash { animation: gaaDashFlow 1s linear infinite; }

/* ── tagline ──────────────────────────────────────────── */
.gaa-tagline {
  margin-top: 2.5rem;
  text-align: center;
  font-family: var(--ply-font-mono, 'IBM Plex Mono', monospace);
  font-size: 0.70rem;
  color: var(--ply-text-dim, #6b6560);
  letter-spacing: 0.03em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.gaa-tagline::before, .gaa-tagline::after {
  content: '';
  display: block;
  height: 1px;
  width: 28px;
  background: var(--ply-border, #ddd9d0);
  flex-shrink: 0;
}

/* ── vertical layout on narrow screens ───────────────── */
@media (max-width: 520px) {
  .gaa-outer { padding-bottom: 0; }
  .gaa-flow { flex-direction: column; }
  .gaa-node__label {
    position: static;
    transform: none;
    display: block;
    margin-top: 5px;
    white-space: normal;
    max-width: 120px;
    margin-left: auto;
    margin-right: auto;
  }
  .gaa-node { margin-bottom: 2px; }
  .gaa-connector { flex-direction: column; }
}
</style>

<div class="gaa-outer">
  <div class="gaa-flow" id="gaa-flow">

    <div class="gaa-node">
      <div class="gaa-node__box gaa-node__box--ga4">📊 GA4 Data API</div>
      <div class="gaa-node__label">Google Analytics 4</div>
    </div>

    <div class="gaa-connector" id="gaa-conn-1"></div>

    <div class="gaa-node">
      <div class="gaa-node__box gaa-node__box--parquet">🗂 Parquet</div>
      <div class="gaa-node__label">Local data files</div>
    </div>

    <div class="gaa-connector" id="gaa-conn-2"></div>

    <div class="gaa-node">
      <div class="gaa-node__box gaa-node__box--plydb">◈ PlyDB</div>
      <div class="gaa-node__label">Query gateway</div>
    </div>

    <div class="gaa-connector" id="gaa-conn-3"></div>

    <div class="gaa-node">
      <div class="gaa-node__box gaa-node__box--agent">◎ AI Agent</div>
      <div class="gaa-node__label">Claude Code (or any agent)</div>
    </div>

  </div>
</div>

<div class="gaa-tagline">Your data stays local — zero ETL, no warehouse, no cloud</div>

<script>
(function () {
  var connectors = [
    { id: 'gaa-conn-1', label: 'download script' },
    { id: 'gaa-conn-2', label: 'SQL' },
    { id: 'gaa-conn-3', label: 'answers' }
  ];

  function cssVar(name, fallback) {
    var v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v || fallback;
  }

  function isNarrow() { return window.innerWidth <= 520; }

  function makeSVG(tag, attrs) {
    var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (var k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function build(wrap, label) {
    wrap.innerHTML = '';
    var accent = cssVar('--ply-accent', '#2563eb');
    var dim    = cssVar('--ply-text-dim', '#6b6560');

    var lbl = document.createElement('span');
    lbl.className = 'gaa-connector__label';
    lbl.textContent = label;

    if (isNarrow()) {
      /* vertical arrow */
      var len = 40;
      var svg = makeSVG('svg', { viewBox: '0 0 12 ' + (len + 10), width: '12', height: len + 10, style: 'display:block;overflow:visible;' });
      svg.appendChild(makeSVG('line', { x1:'6', y1:'0', x2:'6', y2:len, stroke:accent, 'stroke-width':'2', 'stroke-dasharray':'6 4', 'stroke-linecap':'round', 'class':'gaa-dash' }));
      svg.appendChild(makeSVG('polyline', { points:'2,'+len+' 6,'+(len+8)+' 10,'+len, fill:'none', stroke:accent, 'stroke-width':'2', 'stroke-linecap':'round', 'stroke-linejoin':'round' }));
      wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;';
      wrap.appendChild(lbl);
      wrap.appendChild(svg);
    } else {
      /* horizontal arrow */
      var len = 44;
      var svg = makeSVG('svg', { viewBox: '0 0 ' + (len + 10) + ' 12', width: len + 10, height: '12', style: 'display:block;overflow:visible;' });
      svg.appendChild(makeSVG('line', { x1:'0', y1:'6', x2:len, y2:'6', stroke:accent, 'stroke-width':'2', 'stroke-dasharray':'6 4', 'stroke-linecap':'round', 'class':'gaa-dash' }));
      svg.appendChild(makeSVG('polyline', { points:len+',2 '+(len+8)+',6 '+len+',10', fill:'none', stroke:accent, 'stroke-width':'2', 'stroke-linecap':'round', 'stroke-linejoin':'round' }));
      wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;';
      wrap.appendChild(lbl);
      wrap.appendChild(svg);
    }
  }

  function renderAll() {
    connectors.forEach(function(c) {
      var el = document.getElementById(c.id);
      if (el) build(el, c.label);
    });
  }

  renderAll();
  var t; window.addEventListener('resize', function() { clearTimeout(t); t = setTimeout(renderAll, 80); });
})();
</script>
</div>
