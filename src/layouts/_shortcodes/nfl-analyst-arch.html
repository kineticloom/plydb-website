<div id="nfla-arch" aria-label="NFL Analyst — architecture diagram">
<style>
#nfla-arch {
  font-family: var(--ply-font-body, 'Source Sans 3', sans-serif);
  background: var(--ply-surface, #fff);
  border: 1px solid var(--ply-border, #ddd9d0);
  border-radius: 10px;
  padding: 28px 20px 20px;
  margin: 2rem auto;
  color: var(--ply-text, #1a1a1a);
  box-sizing: border-box;
  width: 100%;
  max-width: 680px;
}
#nfla-arch *, #nfla-arch *::before, #nfla-arch *::after { box-sizing: border-box; }

.nfla-outer {
  position: relative;
  padding-bottom: 36px;
}

.nfla-flow {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  flex-wrap: nowrap;
  gap: 0;
}

.nfla-node {
  position: relative;
  flex-shrink: 0;
}

.nfla-node__box {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px 14px;
  border-radius: 9px;
  font-family: var(--ply-font-mono, 'IBM Plex Mono', monospace);
  font-size: 0.82rem;
  font-weight: 600;
  white-space: nowrap;
  border: 1.5px solid transparent;
  line-height: 1.2;
}

.nfla-node__label {
  position: absolute;
  top: calc(100% + 7px);
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--ply-font-mono, 'IBM Plex Mono', monospace);
  font-size: 0.65rem;
  color: var(--ply-text-dim, #6b6560);
  text-align: center;
  white-space: normal;
  max-width: 9rem;
  line-height: 1.3;
  pointer-events: none;
}

.nfla-node__box--nflverse { background: #f0fdf4; border-color: #6ee7b7; color: #064e3b; }
.nfla-node__box--parquet  { background: #f8fafc; border-color: #94a3b8; color: #334155; }
.nfla-node__box--plydb    {
  background: color-mix(in srgb, var(--ply-accent, #2563eb) 10%, transparent);
  border-color: color-mix(in srgb, var(--ply-accent, #2563eb) 40%, transparent);
  color: var(--ply-accent, #2563eb);
}
.nfla-node__box--agent    { background: #fef9ee; border-color: #f59e0b; color: #78350f; }

@media (prefers-color-scheme: dark) {
  .nfla-node__box--nflverse { background: #022c22; border-color: #059669; color: #6ee7b7; }
  .nfla-node__box--parquet  { background: #0f172a; border-color: #475569; color: #cbd5e1; }
  .nfla-node__box--agent    { background: #2d1a00; border-color: #d97706; color: #fde68a; }
}

.nfla-connector {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  gap: 2px;
}

.nfla-connector__label {
  font-family: var(--ply-font-mono, 'IBM Plex Mono', monospace);
  font-size: 0.60rem;
  color: var(--ply-text-dim, #6b6560);
  white-space: nowrap;
  line-height: 1;
}

@keyframes nflaDashFlow { to { stroke-dashoffset: -20; } }
.nfla-dash { animation: nflaDashFlow 1s linear infinite; }

.nfla-tagline {
  margin-top: 2.5rem;
  text-align: center;
  font-family: var(--ply-font-mono, 'IBM Plex Mono', monospace);
  font-size: 0.70rem;
  color: var(--ply-text-dim, #6b6560);
  letter-spacing: 0.03em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.nfla-tagline::before, .nfla-tagline::after {
  content: '';
  display: block;
  height: 1px;
  width: 28px;
  background: var(--ply-border, #ddd9d0);
  flex-shrink: 0;
}

@media (max-width: 520px) {
  .nfla-outer { padding-bottom: 0; }
  .nfla-flow { flex-direction: column; }
  .nfla-node__label {
    position: static;
    transform: none;
    display: block;
    margin-top: 5px;
    white-space: normal;
    max-width: 120px;
    margin-left: auto;
    margin-right: auto;
  }
  .nfla-node { margin-bottom: 2px; }
  .nfla-connector { flex-direction: column; }
}
</style>

<div class="nfla-outer">
  <div class="nfla-flow" id="nfla-flow">

    <div class="nfla-node">
      <div class="nfla-node__box nfla-node__box--nflverse">🏈 nflverse</div>
      <div class="nfla-node__label">GitHub · Parquet releases</div>
    </div>

    <div class="nfla-connector" id="nfla-conn-1"></div>

    <div class="nfla-node">
      <div class="nfla-node__box nfla-node__box--parquet">🗂 Parquet</div>
      <div class="nfla-node__label">Local data files</div>
    </div>

    <div class="nfla-connector" id="nfla-conn-2"></div>

    <div class="nfla-node">
      <div class="nfla-node__box nfla-node__box--plydb">◈ PlyDB</div>
      <div class="nfla-node__label">Query gateway</div>
    </div>

    <div class="nfla-connector" id="nfla-conn-3"></div>

    <div class="nfla-node">
      <div class="nfla-node__box nfla-node__box--agent">◎ AI Agent</div>
      <div class="nfla-node__label">Claude Code (or any agent)</div>
    </div>

  </div>
</div>

<div class="nfla-tagline">Your data stays local — zero ETL, no warehouse, no cloud</div>

<script>
(function () {
  var connectors = [
    { id: 'nfla-conn-1', label: 'download script' },
    { id: 'nfla-conn-2', label: 'SQL' },
    { id: 'nfla-conn-3', label: 'answers' }
  ];

  function cssVar(name, fallback) {
    var v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v || fallback;
  }

  function isNarrow() { return window.innerWidth <= 520; }

  function makeSVG(tag, attrs) {
    var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (var k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function build(wrap, label) {
    wrap.innerHTML = '';
    var accent = cssVar('--ply-accent', '#2563eb');

    var lbl = document.createElement('span');
    lbl.className = 'nfla-connector__label';
    lbl.textContent = label;

    if (isNarrow()) {
      var len = 40;
      var svg = makeSVG('svg', { viewBox: '0 0 12 ' + (len + 10), width: '12', height: len + 10, style: 'display:block;overflow:visible;' });
      svg.appendChild(makeSVG('line', { x1:'6', y1:'0', x2:'6', y2:len, stroke:accent, 'stroke-width':'2', 'stroke-dasharray':'6 4', 'stroke-linecap':'round', 'class':'nfla-dash' }));
      svg.appendChild(makeSVG('polyline', { points:'2,'+len+' 6,'+(len+8)+' 10,'+len, fill:'none', stroke:accent, 'stroke-width':'2', 'stroke-linecap':'round', 'stroke-linejoin':'round' }));
      wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;';
      wrap.appendChild(lbl);
      wrap.appendChild(svg);
    } else {
      var len = 44;
      var svg = makeSVG('svg', { viewBox: '0 0 ' + (len + 10) + ' 12', width: len + 10, height: '12', style: 'display:block;overflow:visible;' });
      svg.appendChild(makeSVG('line', { x1:'0', y1:'6', x2:len, y2:'6', stroke:accent, 'stroke-width':'2', 'stroke-dasharray':'6 4', 'stroke-linecap':'round', 'class':'nfla-dash' }));
      svg.appendChild(makeSVG('polyline', { points:len+',2 '+(len+8)+',6 '+len+',10', fill:'none', stroke:accent, 'stroke-width':'2', 'stroke-linecap':'round', 'stroke-linejoin':'round' }));
      wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;';
      wrap.appendChild(lbl);
      wrap.appendChild(svg);
    }
  }

  function renderAll() {
    connectors.forEach(function(c) {
      var el = document.getElementById(c.id);
      if (el) build(el, c.label);
    });
  }

  renderAll();
  var t; window.addEventListener('resize', function() { clearTimeout(t); t = setTimeout(renderAll, 80); });
})();
</script>
</div>
